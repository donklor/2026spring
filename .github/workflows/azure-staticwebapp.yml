name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

# Add this to force the runner to use Node 24 as requested by the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Updated to Node 24
          cache: 'npm'
          cache-dependency-path: p4/package-lock.json

      - name: Install dependencies
        working-directory: p4
        run: npm install

      - name: Build
        working-directory: p4
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: p4/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
