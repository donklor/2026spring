name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # This tells GitHub Actions to use Node 24 for the internal action logic
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: p4/package-lock.json

      - name: Install dependencies
        working-directory: p4
        run: npm install

      - name: Build app
        working-directory: p4
        # CI=false prevents build failure due to minor warnings (like unused variables)
        run: CI=false npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This points to where your build files are located
          path: p4/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
