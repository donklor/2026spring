name: NodeJS with Webpack

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          # This line tells it where to find the lockfile for caching
          cache-dependency-path: p4/package-lock.json

      - name: Install dependencies
        # This tells GitHub to 'cd p4' before running the command
        working-directory: p4
        run: npm install

      - name: Build app
        # This also needs to be inside p4
        working-directory: p4
        run: CI=false npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ensure this points to the build folder inside p4
          path: p4/build
